<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amis — Robotic Emergence</title>
  <link rel="stylesheet" href="/lib/theme.css" />
  <style>
    .friend-card { padding: 12px 16px; border: 1px solid rgba(255,255,255,0.10); border-radius: 10px; margin-bottom: 8px; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .friend-card.pending { border-color: rgba(251,191,36,0.45); background: rgba(251,191,36,0.08); }
    .friend-card .left { display: flex; align-items: center; gap: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #6b7280; }
    .dot.online { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .right-actions { display: flex; gap: 8px; }
    .right-actions button { padding: 6px 12px; font-size: 12px; }
    .search-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-row input { flex: 1; padding: 10px 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #fff; font-size: 14px; }
    .search-results { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
    .search-results .row { padding: 8px 12px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
    .search-results .row:hover { background: rgba(255,255,255,0.05); }
    h2 { margin-top: 28px; margin-bottom: 12px; font-size: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .invite-toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 18px; background: rgba(34,197,94,0.95); color: #fff; border-radius: 10px; font-weight: 700; box-shadow: 0 4px 20px rgba(0,0,0,0.5); opacity: 0; transform: translateY(20px); transition: opacity .2s, transform .2s; }
    .invite-toast.show { opacity: 1; transform: translateY(0); }
  </style>
  <script src="/lib/menu-music.js" defer></script>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="/prototype/">🎮 Jouer</a>
      <a href="/shop/">🛍️ Boutique</a>
      <a href="/missions/">🎯 Missions</a>
      <a href="/leaderboard/">🏆 Classement</a>
      <a href="/friends/" class="active">👥 Amis</a>
      <a href="/profile/">👤 Profil</a>
      <span class="spacer"></span>
      <span id="adminLink"></span>
      <span class="currency-pill" id="currencyPill">— 💰</span>
      <button class="btn-secondary" id="signoutBtn" style="padding: 6px 12px; font-size: 12px;">Déconnexion</button>
    </div>

    <h1>👥 Amis</h1>
    <p class="muted">Ajoute des joueurs pour voir qui est en ligne et leur envoyer des invitations de partie privées.</p>

    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Tape un pseudo (min 2 caractères)…" autocomplete="off" />
    </div>
    <div class="search-results" id="searchResults"></div>

    <h2>Demandes en attente</h2>
    <div id="pendingList"><div class="muted small">Chargement…</div></div>

    <h2>Mes amis</h2>
    <div id="friendsList"><div class="muted small">Chargement…</div></div>

    <div id="toast" class="invite-toast"></div>
  </div>

  <script type="module">
    import { supabase, getProfile, requireSession } from "/lib/supabase.js";

    await requireSession("/auth/login.html?next=" + encodeURIComponent(location.pathname));
    const profile = await getProfile();
    document.getElementById("currencyPill").textContent = `${profile.currency} 💰`;
    if (profile.is_admin) {
      document.getElementById("adminLink").innerHTML = `<a href="/admin/" style="padding:6px 12px; font-size:12px;">⚙️ Admin</a>`;
    }
    document.getElementById("signoutBtn").addEventListener("click", async () => {
      await supabase.auth.signOut();
      location.href = "/auth/login.html";
    });

    // Ping de présence (5 min de fraîcheur)
    try { await supabase.rpc("re_touch_presence"); } catch {}

    const toast = document.getElementById("toast");
    function flash(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2400);
    }

    async function refreshFriends() {
      const { data: friends, error } = await supabase.rpc("re_list_friends");
      if (error) {
        document.getElementById("friendsList").innerHTML = `<div class="msg msg-error">${error.message}</div>`;
        return;
      }
      const accepted = (friends || []).filter((f) => f.status === "accepted");
      const pending  = (friends || []).filter((f) => f.status === "pending");
      renderFriends(accepted);
      renderPending(pending);
    }

    function isOnline(ts) {
      if (!ts) return false;
      return (Date.now() - new Date(ts).getTime()) < 5 * 60 * 1000;
    }

    function renderFriends(rows) {
      const el = document.getElementById("friendsList");
      if (rows.length === 0) {
        el.innerHTML = `<div class="muted small">Tu n'as pas encore d'amis. Cherche un pseudo ci-dessus.</div>`;
        return;
      }
      el.innerHTML = rows.map((f) => `
        <div class="friend-card">
          <div class="left">
            <div class="dot ${isOnline(f.last_seen_at) ? "online" : ""}"></div>
            <div>
              <div style="font-weight:700;">${f.username || "?"}</div>
              <div class="muted small">ELO ${f.elo}  ·  ${isOnline(f.last_seen_at) ? "En ligne" : "Hors ligne"}</div>
            </div>
          </div>
          <div class="right-actions">
            <button data-invite="${f.friend_id}">📨 Inviter</button>
            <button class="btn-secondary" data-remove="${f.friend_id}">Retirer</button>
          </div>
        </div>
      `).join("");
    }

    function renderPending(rows) {
      const el = document.getElementById("pendingList");
      if (rows.length === 0) { el.innerHTML = `<div class="muted small">Aucune demande en attente.</div>`; return; }
      el.innerHTML = rows.map((f) => `
        <div class="friend-card pending">
          <div class="left">
            <div class="dot ${isOnline(f.last_seen_at) ? "online" : ""}"></div>
            <div>
              <div style="font-weight:700;">${f.username || "?"}</div>
              <div class="muted small">${f.i_requested ? "Tu as envoyé une demande" : "Veut être ton ami"}</div>
            </div>
          </div>
          <div class="right-actions">
            ${f.i_requested
              ? `<button class="btn-secondary" data-remove="${f.friend_id}">Annuler</button>`
              : `<button data-accept="${f.friend_id}">Accepter</button>
                 <button class="btn-secondary" data-remove="${f.friend_id}">Refuser</button>`}
          </div>
        </div>
      `).join("");
    }

    document.body.addEventListener("click", async (e) => {
      const t = e.target;
      const accept = t.dataset.accept;
      const remove = t.dataset.remove;
      const invite = t.dataset.invite;
      if (accept) {
        t.disabled = true;
        await supabase.rpc("re_add_friend", { p_friend_id: accept });
        await refreshFriends();
        return;
      }
      if (remove) {
        t.disabled = true;
        await supabase.rpc("re_remove_friend", { p_friend_id: remove });
        await refreshFriends();
        return;
      }
      if (invite) {
        t.disabled = true;
        const { data, error } = await supabase.rpc("re_create_lobby", {
          p_biome: "desert", p_difficulty: "normal", p_visibility: "private",
        });
        if (error || !data?.[0]) {
          flash("Erreur création salon");
          t.disabled = false;
          return;
        }
        const row = data[0];
        const url = `${location.origin}/prototype/?invite=${encodeURIComponent(row.code)}`;
        try { await navigator.clipboard.writeText(url); flash(`Lien copié ! ${row.code}`); }
        catch { flash(`Code : ${row.code}`); }
        t.disabled = false;
        return;
      }
    });

    // Recherche dynamique avec debounce
    const searchInput = document.getElementById("searchInput");
    const searchResults = document.getElementById("searchResults");
    let searchTimer = null;
    searchInput.addEventListener("input", () => {
      clearTimeout(searchTimer);
      const q = searchInput.value.trim();
      if (q.length < 2) { searchResults.innerHTML = ""; return; }
      searchTimer = setTimeout(async () => {
        const { data } = await supabase.rpc("re_find_player_by_username", { p_q: q });
        if (!data || data.length === 0) {
          searchResults.innerHTML = `<div class="muted small" style="padding:8px 12px;">Aucun joueur trouvé.</div>`;
          return;
        }
        searchResults.innerHTML = data.map((p) => `
          <div class="row">
            <div>
              <div style="font-weight:700;">${p.username}</div>
              <div class="muted small">ELO ${p.elo || 1000}</div>
            </div>
            <button data-add="${p.id}">➕ Ajouter</button>
          </div>
        `).join("");
      }, 250);
    });

    searchResults.addEventListener("click", async (e) => {
      const id = e.target.dataset.add;
      if (!id) return;
      e.target.disabled = true; e.target.textContent = "…";
      const { error } = await supabase.rpc("re_add_friend", { p_friend_id: id });
      if (error) { flash("Erreur : " + error.message); e.target.disabled = false; e.target.textContent = "➕ Ajouter"; return; }
      flash("Demande envoyée !");
      searchInput.value = "";
      searchResults.innerHTML = "";
      await refreshFriends();
    });

    refreshFriends();
    // Ping de présence toutes les minutes tant que la page est ouverte
    setInterval(() => { supabase.rpc("re_touch_presence").catch(() => {}); }, 60_000);
  </script>
</body>
</html>
