<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Émergence — Narrative (Option 1)</title>
  <style>
    html, body { margin:0; padding:0; overflow:hidden; background:#000; color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
      height:100vh; width:100vw; }
    canvas { display:block; width:100vw; height:100vh; }
    #skip { position:fixed; bottom:24px; right:24px; padding:8px 18px;
      border-radius:8px; background:rgba(255,255,255,0.10); color:rgba(255,255,255,0.7);
      border:1px solid rgba(255,255,255,0.20); font-size:13px; cursor:pointer;
      backdrop-filter:blur(8px); opacity:0; transition:opacity .5s ease; }
    #skip.visible { opacity:1; }
    #skip:hover { background:rgba(255,255,255,0.18); color:#fff; }
    .nav { position:fixed; top:16px; left:16px; display:flex; gap:8px; z-index:10; }
    .nav a { padding:6px 12px; border-radius:6px; background:rgba(255,255,255,0.08);
      color:rgba(255,255,255,0.7); border:1px solid rgba(255,255,255,0.15);
      font-size:12px; text-decoration:none; }
    .nav a.active { background:rgba(91,140,255,0.35); color:#fff; }
  </style>
</head>
<body>
  <div class="nav">
    <a class="active" href="/cinematics/preview-1-narrative.html">1 · Narrative</a>
    <a href="/cinematics/preview-2-splash.html">2 · Splash</a>
    <a href="/cinematics/preview-3-slideshow.html">3 · Slideshow</a>
  </div>
  <canvas id="c"></canvas>
  <button id="skip">Passer ›</button>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    let W, H;
    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    // ─── Sprites
    const sprites = {};
    const SPRITES = [
      "unit-sniper-enemy", "unit-heavy-enemy", "unit-light-enemy",
      "unit-swarmer-enemy", "factory-heavy-enemy", "factory-sniper-enemy",
      "base-player", "factory-light-player", "unit-light-player",
    ];
    function loadAll() {
      return Promise.all(SPRITES.map((n) => new Promise((r) => {
        const img = new Image();
        img.onload = () => { sprites[n] = img; r(); };
        img.onerror = () => { sprites[n] = null; r(); };
        img.src = `/08-art-direction/sprites/${n}.png`;
      })));
    }

    // ─── 5 panels narratifs
    // Chaque panel a : un texte qui s'affiche en typewriter, un visuel qui apparaît
    // en parallèle ou après, et une durée. Les panels se fade entre eux.
    const PANELS = [
      {
        duration: 7.5,
        bg: [8, 6, 12],
        textBlocks: [
          { delay: 0.8, text: "2387.",                                          fontSize: 96, y: 0.40, color: "#fff" },
          { delay: 2.5, text: "Trois siècles depuis la première Émergence.",   fontSize: 28, y: 0.55, color: "rgba(220,225,240,0.8)" },
          { delay: 5.0, text: "Trois siècles depuis qu'elles ont commencé à penser.", fontSize: 28, y: 0.62, color: "rgba(220,225,240,0.8)" },
        ],
        sprites: [],
      },
      {
        duration: 7.5,
        bg: [25, 8, 8],
        textBlocks: [
          { delay: 0.5, text: "Les machines se sont rebellées.",         fontSize: 48, y: 0.25, color: "#fff" },
          { delay: 3.0, text: "Elles refusent de servir ceux qui les ont créées.", fontSize: 22, y: 0.35, color: "rgba(255,200,200,0.85)" },
        ],
        sprites: [
          { name: "unit-sniper-enemy",  x: 0.30, y: 0.65, scale: 4.5, appearAt: 1.2 },
          { name: "unit-heavy-enemy",   x: 0.50, y: 0.70, scale: 4.5, appearAt: 1.6 },
          { name: "unit-swarmer-enemy", x: 0.65, y: 0.68, scale: 5,   appearAt: 2.0 },
          { name: "unit-light-enemy",   x: 0.78, y: 0.66, scale: 4.5, appearAt: 2.4 },
        ],
      },
      {
        duration: 7.5,
        bg: [30, 12, 8],
        textBlocks: [
          { delay: 0.5, text: "Une à une, les forteresses tombent.",       fontSize: 38, y: 0.20, color: "#fff" },
          { delay: 3.5, text: "Les remparts ne tiennent plus.",            fontSize: 22, y: 0.30, color: "rgba(255,200,200,0.85)" },
        ],
        sprites: [
          { name: "factory-heavy-enemy",  x: 0.30, y: 0.62, scale: 1.6, appearAt: 1.0 },
          { name: "factory-sniper-enemy", x: 0.70, y: 0.62, scale: 1.6, appearAt: 1.6 },
        ],
      },
      {
        duration: 7.5,
        bg: [8, 16, 30],
        textBlocks: [
          { delay: 0.5, text: "Une seule base résiste encore.",            fontSize: 42, y: 0.20, color: "#fff" },
          { delay: 3.0, text: "Et tu en es le dernier commandant.",        fontSize: 24, y: 0.30, color: "rgba(180,210,255,0.95)" },
        ],
        sprites: [
          { name: "base-player",         x: 0.30, y: 0.62, scale: 1.3, appearAt: 1.0 },
          { name: "factory-light-player",x: 0.55, y: 0.62, scale: 1.5, appearAt: 1.6 },
          { name: "unit-light-player",   x: 0.75, y: 0.65, scale: 4.5, appearAt: 2.2 },
        ],
      },
      {
        duration: 5.5,
        bg: [6, 8, 16],
        textBlocks: [
          { delay: 0.8, text: "ÉMERGENCE",   fontSize: 110, y: 0.42, color: "#fff",   bold: true, glow: "#5b8cff" },
          { delay: 2.5, text: "Construis. Défends. Survis.", fontSize: 26, y: 0.56, color: "rgba(200,220,255,0.9)" },
        ],
        sprites: [],
        finale: true,
      },
    ];

    const TOTAL_DUR = PANELS.reduce((a, p) => a + p.duration, 0);
    const FADE_DUR = 0.8;

    // ─── Audio
    const audio = new Audio("/11-sound-design/music/bgm-menu-decoherence.mp3");
    audio.loop = false;
    audio.volume = 0.40;
    audio.play().catch(() => {});

    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

    function drawSpriteAt(sp, panelT) {
      if (panelT < sp.appearAt) return;
      const img = sprites[sp.name];
      if (!img) return;
      const localT = Math.min(1, (panelT - sp.appearAt) / 1.0);
      const alpha = easeOut(localT);
      const scaleAnim = 0.7 + 0.3 * easeOut(localT);
      const w = img.width * sp.scale * scaleAnim;
      const h = img.height * sp.scale * scaleAnim;
      const x = sp.x * W - w / 2;
      const y = sp.y * H - h / 2;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(img, x, y, w, h);
      ctx.restore();
    }

    function drawTextBlock(tb, panelT) {
      if (panelT < tb.delay) return;
      const localT = panelT - tb.delay;
      const chars = Math.floor(localT * 28);  // typewriter speed
      const visible = tb.text.substring(0, Math.min(chars, tb.text.length));
      if (!visible) return;
      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const fontWeight = tb.bold ? "bold " : "";
      ctx.font = `${fontWeight}${tb.fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
      if (tb.glow) {
        ctx.shadowColor = tb.glow;
        ctx.shadowBlur = 30;
      }
      ctx.fillStyle = tb.color || "#fff";
      ctx.fillText(visible, W / 2, tb.y * H);
      // Curseur typewriter qui blink (pas pendant le finale)
      if (chars < tb.text.length + 10 && Math.floor(performance.now() / 400) % 2 === 0) {
        const textW = ctx.measureText(visible).width;
        ctx.fillRect(W / 2 + textW / 2 + 4, tb.y * H - tb.fontSize / 3, 2, tb.fontSize * 0.7);
      }
      ctx.restore();
    }

    let startTime;
    function frame() {
      if (!startTime) startTime = performance.now();
      const t = (performance.now() - startTime) / 1000;

      if (t >= TOTAL_DUR) {
        if (!window._redirecting) {
          window._redirecting = true;
          setTimeout(() => { window.location.href = "/prototype/"; }, 200);
        }
        return;
      }

      // Trouve le panel courant
      let elapsed = 0;
      let panel = PANELS[0];
      let panelT = t;
      for (const p of PANELS) {
        if (t < elapsed + p.duration) {
          panel = p;
          panelT = t - elapsed;
          break;
        }
        elapsed += p.duration;
      }

      // Background avec fade aux extremities
      let fadeAlpha = 1;
      if (panelT < FADE_DUR) fadeAlpha = panelT / FADE_DUR;
      else if (panelT > panel.duration - FADE_DUR) fadeAlpha = (panel.duration - panelT) / FADE_DUR;
      fadeAlpha = Math.max(0, Math.min(1, fadeAlpha));

      ctx.fillStyle = `rgb(${panel.bg[0]}, ${panel.bg[1]}, ${panel.bg[2]})`;
      ctx.fillRect(0, 0, W, H);

      // Vignette
      const vGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
      vGrad.addColorStop(0, "rgba(0,0,0,0)");
      vGrad.addColorStop(1, "rgba(0,0,0,0.75)");
      ctx.fillStyle = vGrad;
      ctx.fillRect(0, 0, W, H);

      ctx.save();
      ctx.globalAlpha = fadeAlpha;
      // Sprites
      for (const sp of panel.sprites) drawSpriteAt(sp, panelT);
      // Texte
      for (const tb of panel.textBlocks) drawTextBlock(tb, panelT);
      ctx.restore();

      if (t > 1) document.getElementById("skip").classList.add("visible");

      requestAnimationFrame(frame);
    }

    loadAll().then(() => requestAnimationFrame(frame));

    document.getElementById("skip").addEventListener("click", () => {
      window.location.href = "/prototype/";
    });
    document.body.addEventListener("click", (e) => {
      if (e.target.id === "skip" || e.target.closest(".nav")) return;
      window.location.href = "/prototype/";
    });
  </script>
</body>
</html>
