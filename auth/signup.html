<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inscription — Robotic Emergence</title>
  <link rel="stylesheet" href="/lib/theme.css" />
  <script src="/lib/menu-music.js" defer></script>
</head>
<body>
  <div class="center-page">
    <form class="card" id="signupForm">
      <p class="brand">🤖 ÉMERGENCE</p>
      <p class="brand-sub">Créer un compte</p>

      <div id="msg"></div>

      <label for="username">Nom d'utilisateur</label>
      <input type="text" id="username" required minlength="3" maxlength="20"
             pattern="[a-zA-Z0-9_-]+" autocomplete="username" />

      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email" />

      <label for="password">Mot de passe (≥ 6 caractères)</label>
      <input type="password" id="password" required minlength="6" autocomplete="new-password" />

      <div style="height: 18px"></div>

      <button class="btn-block" id="submitBtn" type="submit">Créer mon compte</button>

      <p class="small muted" style="text-align:center; margin-top: 16px">
        Déjà inscrit ? <a href="/auth/login.html">Se connecter</a><br>
        <a href="/prototype/">← Retour au jeu (mode invité)</a>
      </p>
    </form>
  </div>

  <script type="module">
    import { supabase } from "/lib/supabase.js";

    const form = document.getElementById("signupForm");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("submitBtn");

    const { data: { session } } = await supabase.auth.getSession();
    if (session) location.href = "/prototype/";

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.innerHTML = "";
      btn.disabled = true; btn.textContent = "Inscription…";

      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signUp({
        email, password,
        options: { data: { username } },
      });
      if (error) {
        msg.innerHTML = `<div class="msg msg-error">${error.message}</div>`;
        btn.disabled = false; btn.textContent = "Créer mon compte";
        return;
      }

      // Update du profil pour s'assurer que username est bien posé (trigger auto-handle aussi)
      if (data.session) {
        await supabase.from("re_profiles").update({ username }).eq("id", data.user.id);
        location.href = "/prototype/";
      } else {
        msg.innerHTML = `<div class="msg msg-success">Compte créé ! Confirme ton email pour te connecter.</div>`;
        btn.textContent = "Email envoyé ✓";
      }
    });
  </script>
</body>
</html>
