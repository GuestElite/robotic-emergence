<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f1419" />
  <title>Robotic Emergence</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="orientation-warning">
    <div>📱➡️🔄</div>
    <p>Tourne ton téléphone en mode paysage pour jouer</p>
  </div>
  <div id="game-wrapper">
    <canvas id="game-canvas" width="1280" height="720"></canvas>
    <!-- Input invisible utilisé sur mobile pour faire apparaître le clavier
         virtuel quand on entre en mode chat ou saisie de code lobby.
         Géré par game.js : focus/blur déclenchés en sync avec game.ui state. -->
    <input id="mobile-keyboard-proxy"
           type="text"
           autocomplete="off"
           autocorrect="off"
           autocapitalize="off"
           spellcheck="false"
           inputmode="text"
           aria-hidden="true" />
  </div>
  <script type="module" src="auth-bridge.js"></script>
  <script type="module" src="multiplayer.js"></script>
  <script src="game.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch((err) => {
          console.warn("[PWA] SW registration failed:", err);
        });
      });
    }
  </script>
</body>
</html>
